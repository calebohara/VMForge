# VMForge CI skeleton.
# Owned by build-engineer (matrix/build) + qa-engineer (test gates).
# A green run means ALL THREE OSes pass — the dev host is Apple-Silicon-only,
# so Windows/Linux are validated here, not locally.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, OS-independent gates: core unit tests + fmt + clippy + frontend.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: workspace unit tests
        run: cargo test --workspace
      - name: frontend install + typecheck + build + test
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm test

  # Per-OS compile matrix. build-engineer extends this to real `tauri build`
  # + signing + artifacts.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Linux system deps (Tauri 2)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev \
            patchelf build-essential file
      - name: Build frontend
        run: |
          npm ci
          npm run build
      - name: cargo check (workspace)
        run: cargo check --workspace
