# VMForge CI — Windows-only (the only supported platform).
#
# Gates: rustfmt, clippy (compiles all targets incl. tests), the workspace build,
# and the frontend (typecheck + build + vitest). The Rust unit/integration tests
# use a `#!/bin/sh` qemu-img mock that Windows can't spawn, so they execute on a
# unix dev box; here we compile + lint them and build the app.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: Frontend install + typecheck + build + test
        run: |
          npm ci
          npm run typecheck
          npm run build
          npm test

      - name: cargo clippy (workspace, all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build (workspace)
        run: cargo build --workspace
