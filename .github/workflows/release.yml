# VMForge release workflow (spec §D, decisions D5/D6/D8).
#
# ACTIVE: a real updater keypair exists — the public key is in
# tauri.conf.json (plugins.updater.pubkey) and the private key is the
# TAURI_SIGNING_PRIVATE_KEY repo secret (password empty). The workflow is
# additive and OFF the PR path — ci.yml stays the PR gate (untouched). This
# only runs on `push` of a `v*` tag, so opening a PR never triggers it.
#
# To cut a release: bump the version in package.json + src-tauri/tauri.conf.json,
# commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`. CI builds + signs +
# publishes the GitHub Release (installers + latest.json); installed apps then
# auto-update from /releases/latest/download/latest.json.
#
# Optional hardening (not required for auto-update to work): add the APPLE_*
# secrets for Developer-ID signing + notarization (otherwise the macOS app is
# ad-hoc signed and triggers Gatekeeper on first open). Windows is unsigned
# (SmartScreen) without a code-signing cert. The updater signature is separate
# and works regardless.
#
# The `--config src-tauri/tauri.release.conf.json` arg patches
# `bundle.createUpdaterArtifacts` to true ONLY for release builds; the base
# tauri.conf.json keeps it false so local/CI `tauri build` never tries to sign
# update artifacts with the placeholder pubkey (which would fail the build).
name: Release

on:
  push:
    tags:
      - "v*"

# Required so tauri-action can create the draft GitHub Release + upload assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon.
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles app,dmg,updater"
          # macOS Intel.
          - platform: macos-latest
            args: "--target x86_64-apple-darwin --bundles app,dmg,updater"
          # Linux (auto-update is manual download on Linux per D8, but we still
          # publish deb + AppImage bundles).
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage,updater"
          # Windows.
          - platform: windows-latest
            args: "--bundles nsis,updater"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (Tauri 2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev \
            patchelf build-essential file

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Cross-arch macOS builds need both Apple targets available.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Updater signing (active). Private key is the repo secret; the
          #     public key is in tauri.conf.json (plugins.updater.pubkey). ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # NOTE: the macOS Developer-ID / notarization env vars (APPLE_CERTIFICATE,
          # APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID) are
          # intentionally OMITTED. tauri-action treats a defined-but-empty
          # APPLE_CERTIFICATE as "sign me" and runs `security import` on an empty
          # cert, which FAILS the macOS build. With them absent, macOS bundles are
          # ad-hoc signed (Gatekeeper right-click→Open). To enable real signing +
          # notarization, add the APPLE_* repo secrets AND re-add them here.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VMForge ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          # Publish (not draft) so the updater endpoint
          # /releases/latest/download/latest.json resolves immediately.
          releaseDraft: false
          prerelease: false
          # Patch createUpdaterArtifacts true for release only (base stays false),
          # plus per-OS bundle selection from the matrix.
          args: --config src-tauri/tauri.release.conf.json ${{ matrix.args }}
