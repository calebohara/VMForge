# VMForge release workflow — Windows-only (the only supported platform).
#
# ACTIVE: a real updater keypair exists — the public key is in
# tauri.conf.json (plugins.updater.pubkey) and the private key is the
# TAURI_SIGNING_PRIVATE_KEY repo secret (password empty). Runs only on `push`
# of a `v*` tag.
#
# To cut a release: bump the version in package.json + src-tauri/tauri.conf.json,
# commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`. CI builds + signs +
# publishes the GitHub Release (the NSIS installer + latest.json); installed apps
# then auto-update from /releases/latest/download/latest.json.
#
# Windows is unsigned (SmartScreen warns on first run) without a code-signing
# cert; the updater's own signature is separate and works regardless.
#
# The `--config src-tauri/tauri.release.conf.json` arg flips
# `bundle.createUpdaterArtifacts` to true for release builds only; the base
# tauri.conf.json keeps it false so a plain `tauri build` never tries to sign
# update artifacts.
name: Release

on:
  push:
    tags:
      - "v*"

# Required so tauri-action can create the draft GitHub Release + upload assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (active). Private key is the repo secret; the public
          # key is in tauri.conf.json (plugins.updater.pubkey).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VMForge ${{ github.ref_name }}"
          releaseBody: "Download the Windows installer below. VMForge requires QEMU for Windows (https://qemu.weilnetz.de) to be installed."
          # Publish (not draft) so the updater endpoint
          # /releases/latest/download/latest.json resolves immediately.
          releaseDraft: false
          prerelease: false
          # Patch createUpdaterArtifacts true for release only (base stays false).
          args: --config src-tauri/tauri.release.conf.json --bundles nsis,updater
